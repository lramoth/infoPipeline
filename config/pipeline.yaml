default_profile: techno

profiles:
  techno:
    researcher_prompt_path: prompts/researchers/techno_news.md
    curator_prompt_path: prompts/curators/techno_news_curator.md
    writer_prompt_path: prompts/writers/outbound_brief.md
    writer_template_path: prompts/writers/template.md

stages:
  - name: researcher
    model:
      provider: gemini
      name: gemini-2.5-flash
      endpoint: https://generativelanguage.googleapis.com/v1beta/models
  - name: curator
    model:
      provider: openai
      name: gpt-4.1-mini
      endpoint: https://api.openai.com/v1/responses
  - name: writer
    model:
      provider: ollama
      name: gemma4:e4b
      endpoint: http://localhost:11434/api/generate

delivery:
  - provider: telegram
    enabled: true
