default_profile: techno-releases

profiles:
  techno-releases:
    researcher_prompt_path: prompts/researchers/release_researcher.md
    researcher_prompt_paths:
      gemini: prompts/researchers/release_researcher.md
      openai: prompts/researchers/release_researcher_openai.md
    curator_prompt_path: prompts/curators/release_curator.md
    writer_prompt_path: prompts/writers/outbound_brief.md
    writer_template_path: prompts/writers/template.md

stages:
  - name: researcher
    provider: bandcamp
    discovery:
      category_id: 0
      tag_norm_names:
        - hypnotic-techno
        - techno
      geoname_id: 0
      slice: new
      time_facet_id: 0
      cursor: "*"
      size: 24
      include_result_types:
        - a
        - s
  - name: researcher
    provider: bandcamp
    discovery:
      category_id: 0
      tag_norm_names:
        - dub-techno
      geoname_id: 0
      slice: new
      time_facet_id: 0
      cursor: "*"
      size: 24
      include_result_types:
        - a
        - s
  - name: curator
    provider: openai
    model:
      name: gpt-4.1-mini
      endpoint: https://api.openai.com/v1/responses
  - name: writer
    provider: ollama
    model:
      name: gemma4:e4b
      endpoint: http://localhost:11434/api/generate

delivery:
  - provider: telegram
    enabled: true
